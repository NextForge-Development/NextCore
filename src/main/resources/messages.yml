general:
  prefix: "<dark_gray>[<gradient:aqua:dark_aqua>ɴᴇxᴛᴄᴏʀᴇ<dark_gray>]</gradient></dark_gray>"
  no-permission: "%prefix% <red>You do not have permission to perform this action.</red>"
  only-players: "%prefix% <red>This command can only be used by players.</red>"

commands:
  nextcore:
    help:
      - "<gold>┌────────────</gold> <yellow>NextCore Help</yellow> <gold>────────────</gold>"
      - "<gold>│</gold>"
      - "<gold>│</gold>  <gray>/nextcore <yellow>reload</yellow><dark_gray> - </dark_gray>Reloads the NextCore configuration"
      - "<gold>│</gold>  <gray>/nextcore <yellow>version</yellow><dark_gray> - </dark_gray>Displays the NextCore version"
      - "<gold>│</gold>  <gray>/nextcore <yellow>debug</yellow><dark_gray> - </dark_gray>Toggles debug mode for NextCore"
      - "<gold>│</gold>  <gray>/nextcore <yellow>update</yellow><dark_gray> - </dark_gray>Checks for updates to NextCore"
      - "<gold>│</gold>  <gray>/nextcore <yellow>info</yellow><dark_gray> - </dark_gray>Get server information"
      - "<gold>│</gold>  <gray>/nextcore <yellow>help</yellow><dark_gray> - </dark_gray>Displays this help message"
      - "<gold>│</gold>"
      - "<gold>│</gold>  <gray>Made by <gold>%author%</gold> | <gold>Version: %version%</gold></gray>"
      - "<gold>│</gold>"
      - "<gold>└────────────</gold> <yellow>NextCore Help</yellow> <gold>────────────</gold>"
    reload:
      success: "%prefix% <green>Configuration reloaded successfully.</green> <gray>(%time%ms)</gray>"
      error: "%prefix% <red>Failed to reload configuration: %error%</red>"
    version:
      message: "%prefix% <green>NextCore Version: %version%</green> <gray>(%commit%)</gray>"
    debug:
      enabled: "%prefix% <green>Debug mode enabled.</green>"
      disabled: "%prefix% <red>Debug mode disabled.</red>"
    update:
      checking: "%prefix% <yellow>Checking for updates...</yellow>"
      available: "%prefix% <green>An update is available! Version: %version% - Do you want to download it? Run /nextcore update download</green>"
      up_to_date: "%prefix% <green>You are using the latest version of NextCore.</green>"
      error: "%prefix% <red>Error checking for updates: %error%</red>"
      download:
        start: "%prefix% <yellow>Starting download of NextCore update...</yellow>"
        success: "%prefix% <green>Update downloaded successfully. Restart the server to apply the update.</green>"
        error: "%prefix% <red>Error downloading update: %error%</red>"
    info:
      message:
        - "<gold>┌────────────</gold> <yellow>Server Info</yellow> <gold>────────────</gold>"
        - "<gold>│</gold>"
        - "<gold>│</gold>  <gray>Server Name: <yellow>%server_name%</yellow></gray>"
        - "<gold>│</gold>  <gray>Version: <yellow>%server_version%</yellow></gray>"
        - "<gold>│</gold>  <gray>Online Players: <yellow>%online_players%/%max_players%</yellow></gray>"
        - "<gold>│</gold>  <gray>Worlds: <yellow>%worlds%</yellow></gray>"
        - "<gold>│</gold>  <gray>Plugins: <yellow>%plugins%</yellow></gray>"
        - "<gold>│</gold>  <gray>Java Version: <yellow>%java_version%</yellow></gray>"
        - "<gold>│</gold>  <gray>OS: <yellow>%os%</yellow></gray>"
        - "<gold>│</gold>  <gray>Uptime: <yellow>%uptime%</yellow></gray>"
        - "<gold>│</gold>  <gray>Memory: <yellow>%memory_usage%</yellow></gray>"
        - "<gold>│</gold>  <gray>TPS: <yellow>%tps%</yellow></gray>"
        - "<gold>│</gold>  <gray>Debug Mode: <yellow>%debug_mode%</yellow></gray>"
        - "<gold>│</gold>  <gray>NextCore Version: <yellow>%nextcore_version%</yellow></gray>"
        - "<gold>│</gold>"
        - "<gold>│</gold>  <gray>Made by <gold>%authors%</gold></gray>"
        - "<gold>│</gold>"
        - "<gold>└────────────</gold> <yellow>Server Info</yellow> <gold>────────────</gold>"
      error: "%prefix% <red>Unable to retrieve server information. %error%</red>"